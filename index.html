<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liza's Place Booking</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Liza's Place Private Resort</h1>
    </header>
    <main>
        <section id="booking-form">
            <h2>Book Your Stay</h2>
            <form>
                <label for="room">Select Room:</label>
                <select id="room">
                    <option value="single">Single Room</option>
                    <option value="double">Double Room</option>
                    <option value="suite">Suite</option>
                </select>
                <label for="dates">Select Dates:</label>
                <input type="text" id="dates" placeholder="YYYY-MM-DD to YYYY-MM-DD">
                <label for="guests">Number of Guests:</label>
                <input type="number" id="guests" min="1" value="1">
                <fieldset>
                    <legend>Amenities:</legend>
                    <label><input type="checkbox" value="pool">Pool</label>
                    <label><input type="checkbox" value="gym">Gym</label>
                    <label><input type="checkbox" value="spa">Spa</label>
                </fieldset>
                <button type="submit">Check Availability</button>
            </form>
            <section id="reviews">
                <h3>Customer Reviews</h3>
                <p>"Great stay, very comfortable!" - Sarah</p>
                <p>"Wonderful service and amenities!" - Mark</p>
            </section>
        </section>
    </main>
    <footer>
        <p>© 2026 Liza's Place Private Resort</p>
    </footer>
</body>
</html>
